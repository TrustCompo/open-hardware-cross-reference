name: Missing alternative
description: Suggest a replacement candidate that should be considered.
title: "[Missing alternative]: "
labels: ["enhancement", "cross-reference"]
body:
  - type: input
    id: original_part
    attributes:
      label: Original part number
    validations:
      required: true
  - type: input
    id: candidate_part
    attributes:
      label: Suggested candidate part number
    validations:
      required: true
  - type: dropdown
    id: relationship
    attributes:
      label: Candidate relationship
      options:
        - Pin-to-pin candidate
        - Functional candidate
        - Similar candidate
        - Unsure
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Include datasheet or manufacturer links, package notes, and key parameter comparisons.
    validations:
      required: true
  - type: textarea
    id: caveats
    attributes:
      label: Known caveats
      description: List any parameter, lifecycle, compliance, or application limits.
